<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>工作台</h1>
      <button class="btn-settings" onclick="openSettings()">⚙️ 设置</button>
    </header>

    <div class="toolbar">
      <button class="btn-primary" onclick="addCategory()">+ 添加分类</button>
    </div>

    <div id="categories" class="categories"></div>
  </div>

  <!-- 设置弹窗 -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <h2>设置</h2>
      <div class="form-group">
        <label>数据存储路径：</label>
        <input type="text" id="dataPath" placeholder="/path/to/data">
      </div>
      <div class="form-group">
        <label>背景颜色：</label>
        <input type="color" id="backgroundColor">
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveSettings()">保存</button>
        <button class="btn-secondary" onclick="closeSettings()">取消</button>
      </div>
    </div>
  </div>

  <!-- 分类编辑弹窗 -->
  <div id="categoryModal" class="modal">
    <div class="modal-content">
      <h2 id="categoryModalTitle">添加分类</h2>
      <div class="form-group">
        <label>分类名称：</label>
        <input type="text" id="categoryName" placeholder="输入分类名称">
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveCategory()">保存</button>
        <button class="btn-secondary" onclick="closeCategoryModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- 链接编辑弹窗 -->
  <div id="linkModal" class="modal">
    <div class="modal-content">
      <h2 id="linkModalTitle">添加链接</h2>
      <div class="form-group">
        <label>链接名称：</label>
        <input type="text" id="linkName" placeholder="输入链接名称">
      </div>
      <div class="form-group">
        <label>链接地址：</label>
        <input type="text" id="linkUrl" placeholder="https://example.com">
      </div>
      <div class="modal-actions">
        <button class="btn-primary" onclick="saveLink()">保存</button>
        <button class="btn-secondary" onclick="closeLinkModal()">取消</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
